<ion-app>
  <ion-router-outlet></ion-router-outlet>
  

  <ion-tab-bar slot="bottom" class="tab-bar" 
               [class.tabs-hidden]="!shouldShowTabs()"
               *ngIf="shouldShowTabs()"
               [attr.hidden]="!shouldShowTabs()"
               [attr.data-visible]="shouldShowTabs()">
    <ion-tab-button tab="home" href="/home">
      <ion-icon name="home" aria-label="Home"></ion-icon>
      <ion-label>Home</ion-label>
    </ion-tab-button>
    
    <ion-tab-button tab="donors" href="/donors">
      <ion-icon name="people" aria-label="Donors"></ion-icon>
      <ion-label>Donors</ion-label>
    </ion-tab-button>
    
    <ion-tab-button tab="profile" href="/profile">
      <ion-icon name="person" aria-label="Profile"></ion-icon>
      <ion-label>Profile</ion-label>
    </ion-tab-button>
    
    <ion-tab-button tab="about" href="/about">
      <ion-icon name="information-circle" aria-label="About"></ion-icon>
      <ion-label>About</ion-label>
    </ion-tab-button>
  </ion-tab-bar>
</ion-app>
